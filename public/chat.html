<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мессенджер - Чаты</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #131313;
        --surface2: #1a1a1a;
        --primary: #8b5cf6;
        --primary-glow: rgba(139, 92, 246, 0.3);
        --secondary: #a78bfa;
        --text: #ffffff;
        --text2: #a0a0a0;
        --border: rgba(139, 92, 246, 0.15);
        --input-bg: #1e1e1e;
        --shadow: 0 0 30px rgba(139, 92, 246, 0.1);
        --gradient: linear-gradient(
          135deg,
          #8b5cf6 0%,
          #6366f1 50%,
          #a78bfa 100%
        );
        --msg-sent: linear-gradient(135deg, #8b5cf6, #6366f1);
        --msg-received: #1e1e1e;
        --online: #4ade80;
      }

      .light-theme {
        --bg: #f0f4ff;
        --surface: #ffffff;
        --surface2: #f8faff;
        --primary: #3b82f6;
        --primary-glow: rgba(59, 130, 246, 0.2);
        --secondary: #60a5fa;
        --text: #1e293b;
        --text2: #64748b;
        --border: rgba(59, 130, 246, 0.2);
        --input-bg: #f1f5f9;
        --shadow: 0 0 30px rgba(59, 130, 246, 0.1);
        --gradient: linear-gradient(
          135deg,
          #3b82f6 0%,
          #6366f1 50%,
          #60a5fa 100%
        );
        --msg-sent: linear-gradient(135deg, #3b82f6, #6366f1);
        --msg-received: #e2e8f0;
        --online: #22c55e;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        transition: all 0.5s ease;
        overflow: hidden;
      }

      /* Сайдбар */
      .sidebar {
        width: 380px;
        min-width: 380px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--surface2);
      }

      .sidebar-header h3 {
        font-size: 20px;
        font-weight: 700;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .sidebar-header .actions {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text);
        width: 36px;
        height: 36px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .icon-btn:hover {
        border-color: var(--primary);
        box-shadow: 0 0 15px var(--primary-glow);
        transform: scale(1.05);
      }

      .search-box {
        padding: 16px 20px;
      }

      .search-box input {
        width: 100%;
        padding: 12px 16px;
        background: var(--input-bg);
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-size: 14px;
        transition: all 0.3s ease;
        outline: none;
      }

      .search-box input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 15px var(--primary-glow);
      }

      .chats-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 12px;
      }

      .chats-list::-webkit-scrollbar {
        width: 4px;
      }

      .chats-list::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 4px;
      }

      .chat-item {
        padding: 14px;
        margin-bottom: 4px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .chat-item:hover {
        background: var(--surface2);
        transform: translateX(4px);
      }

      .chat-item.active {
        background: var(--primary);
        background: var(--gradient);
        box-shadow: 0 4px 15px var(--primary-glow);
      }

      .chat-item.active .chat-name,
      .chat-item.active .chat-last {
        color: white;
      }

      .chat-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
      }

      .chat-info {
        flex: 1;
        min-width: 0;
      }

      .chat-name {
        font-weight: 600;
        font-size: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-last {
        font-size: 13px;
        color: var(--text2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }

      .online-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--online);
        flex-shrink: 0;
        box-shadow: 0 0 10px var(--online);
      }

      .sidebar-footer {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
      }

      .logout-btn {
        width: 100%;
        padding: 12px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #ef4444;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .logout-btn:hover {
        background: rgba(239, 68, 68, 0.2);
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
      }

      /* Главная область */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }

      .empty-chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        opacity: 0.5;
      }

      .empty-chat .icon {
        font-size: 80px;
        animation: float 3s infinite ease-in-out;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .chat-view {
        display: none;
        flex-direction: column;
        height: 100%;
      }

      .chat-view.active {
        display: flex;
      }

      .chat-header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--surface);
        backdrop-filter: blur(10px);
      }

      .chat-header h2 {
        font-size: 18px;
        font-weight: 600;
      }

      .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .messages::-webkit-scrollbar {
        width: 4px;
      }

      .messages::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 4px;
      }

      .message {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 16px;
        animation: messageIn 0.3s ease;
        word-wrap: break-word;
        position: relative;
      }

      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.sent {
        background: var(--msg-sent);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .message.received {
        background: var(--msg-received);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }

      .light-theme .message.received {
        color: #1e293b;
      }

      .message .msg-sender {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        opacity: 0.8;
      }

      .message .msg-time {
        font-size: 10px;
        opacity: 0.6;
        margin-top: 4px;
        text-align: right;
      }

      .message-input {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 12px;
        background: var(--surface);
      }

      .message-input input {
        flex: 1;
        padding: 12px 16px;
        background: var(--input-bg);
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-size: 14px;
        transition: all 0.3s ease;
        outline: none;
      }

      .message-input input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 15px var(--primary-glow);
      }

      .send-btn {
        background: var(--gradient);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      .send-btn:hover {
        box-shadow: 0 4px 20px var(--primary-glow);
        transform: scale(1.02);
      }

      /* Уведомления */
      #notifications-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .notification-toast {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 16px 20px;
        border-radius: 16px;
        box-shadow: var(--shadow);
        min-width: 320px;
        animation: slideInRight 0.4s ease;
        cursor: pointer;
        backdrop-filter: blur(20px);
        position: relative;
        border-left: 4px solid var(--primary);
      }

      .notification-toast.group {
        border-left-color: #6366f1;
      }

      @keyframes slideInRight {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOutRight {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }

      .notification-toast .notif-sender {
        font-weight: 600;
        margin-bottom: 4px;
        font-size: 14px;
      }

      .notification-toast .notif-msg {
        opacity: 0.8;
        font-size: 13px;
      }

      .notification-toast .close-btn {
        position: absolute;
        top: 8px;
        right: 12px;
        background: none;
        border: none;
        color: var(--text2);
        cursor: pointer;
        font-size: 18px;
        transition: all 0.3s ease;
      }

      .notification-toast .close-btn:hover {
        color: var(--text);
      }

      .theme-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 50%;
        width: 48px;
        height: 48px;
        cursor: pointer;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        color: var(--text);
        box-shadow: var(--shadow);
      }

      .theme-toggle:hover {
        box-shadow: 0 0 20px var(--primary-glow);
        transform: rotate(180deg);
      }

      /* Мобильное меню */
      .mobile-toggle {
        display: none;
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 200;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 10px;
        width: 40px;
        height: 40px;
        cursor: pointer;
        font-size: 20px;
        color: var(--text);
        align-items: center;
        justify-content: center;
      }

      /* Адаптивность */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          left: -100%;
          top: 0;
          bottom: 0;
          width: 100%;
          max-width: 380px;
          z-index: 150;
          transition: left 0.3s ease;
          box-shadow: var(--shadow);
        }

        .sidebar.open {
          left: 0;
        }

        .mobile-toggle {
          display: flex;
        }

        .main {
          width: 100%;
        }

        .message {
          max-width: 85%;
        }

        .notification-toast {
          min-width: auto;
          width: calc(100vw - 40px);
        }
      }
    </style>
  </head>
  <body>
    <!-- Мобильная кнопка -->
    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>

    <!-- Сайдбар -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>💬 Мессенджер</h3>
        <div class="actions">
          <button
            class="icon-btn"
            onclick="createGroup()"
            title="Создать группу"
          >
            👥
          </button>
          <button class="icon-btn" onclick="toggleTheme()" title="Сменить тему">
            🌓
          </button>
        </div>
      </div>
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="🔍 Поиск пользователей..."
          onkeyup="searchUsers()"
        />
      </div>
      <div id="chats-list" class="chats-list"></div>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
          🚪 Выйти из аккаунта
        </button>
      </div>
    </div>

    <!-- Главная область -->
    <div class="main">
      <div id="empty-chat" class="empty-chat">
        <div class="icon">💭</div>
        <p>Выберите чат или создайте новый</p>
      </div>
      <div id="chat-view" class="chat-view">
        <div class="chat-header">
          <h2 id="chat-title"></h2>
          <button class="icon-btn" onclick="closeChat()">✕</button>
        </div>
        <div id="messages" class="messages"></div>
        <div class="message-input">
          <input
            type="text"
            id="message-input"
            placeholder="Напишите сообщение..."
            onkeypress="if (event.key === 'Enter') sendMessage();"
          />
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

    <!-- Уведомления -->
    <div id="notifications-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const token = localStorage.getItem("token");
      const currentUser = JSON.parse(localStorage.getItem("user"));

      if (!token || !currentUser) {
        window.location.href = "/";
      }

      const socket = io();
      let currentChat = null;
      let chats = [];
      let onlineUserIds = new Set();

      // Темы
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") {
        document.body.classList.add("light-theme");
      }

      function toggleTheme() {
        document.body.classList.toggle("light-theme");
        localStorage.setItem(
          "theme",
          document.body.classList.contains("light-theme") ? "light" : "dark",
        );
      }

      // Сайдбар для мобильных
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
      }

      // Уведомления
      function showNotification(
        title,
        message,
        type = "private",
        chatId = null,
      ) {
        const container = document.getElementById("notifications-container");
        const toast = document.createElement("div");
        toast.className = `notification-toast ${type}`;
        toast.innerHTML = `
        <div class="notif-sender">${title}</div>
        <div class="notif-msg">${message}</div>
        <button class="close-btn" onclick="event.stopPropagation(); this.parentElement.remove()">✕</button>
      `;

        if (chatId) {
          toast.addEventListener("click", (e) => {
            if (e.target.classList.contains("close-btn")) return;
            openChatById(chatId);
            toast.remove();
          });
        }

        container.appendChild(toast);
        setTimeout(() => {
          if (toast.parentElement) {
            toast.style.animation = "slideOutRight 0.3s ease forwards";
            setTimeout(() => toast.remove(), 300);
          }
        }, 5000);
      }

      // Push уведомления
      async function subscribeToPush() {
        if (!("serviceWorker" in navigator) || !("PushManager" in window))
          return;
        try {
          const registration = await navigator.serviceWorker.register("/sw.js");
          const subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(
              "BE_g7Xn1J6PJGZPhPJQSFta3sOahYk_o0fCn1zjhDPflZ5VCv8Rgy0Fvoo6qj1SfROnus50AEQGlaD8faeAbDNY",
            ),
          });
          await fetch("/api/push/subscribe", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify(subscription),
          });
        } catch (error) {}
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding)
          .replace(/\-/g, "+")
          .replace(/_/g, "/");
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }

      socket.emit("user-login", {
        id: currentUser.id,
        username: currentUser.username,
      });

      async function loadChats() {
        try {
          const res = await fetch("/api/chats", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          if (data.success) {
            chats = data.chats;
            renderChats();
          }
        } catch (error) {}
      }

      function getChatName(chat) {
        if (chat.name) return chat.name;
        const other = chat.members?.find((m) => m.id !== currentUser.id);
        return other?.display_name || other?.username || "Чат";
      }

      function getChatAvatar(chat) {
        const name = getChatName(chat);
        return name.charAt(0).toUpperCase();
      }

      function renderChats() {
        const container = document.getElementById("chats-list");
        container.innerHTML = chats
          .map((chat, i) => {
            const other = chat.members?.find((m) => m.id !== currentUser.id);
            const isOnline = other && onlineUserIds.has(other.id);
            return `
          <div class="chat-item ${currentChat?.id === chat.id ? "active" : ""}" 
               onclick="openChatById(${chat.id})" 
               style="animation-delay: ${i * 0.05}s">
            <div class="chat-avatar">${getChatAvatar(chat)}</div>
            <div class="chat-info">
              <div class="chat-name">${getChatName(chat)}</div>
              <div class="chat-last">${chat.last_message || "Нет сообщений"}</div>
            </div>
            ${isOnline ? '<div class="online-dot"></div>' : ""}
          </div>
        `;
          })
          .join("");
      }

      function openChatById(chatId) {
        currentChat = chats.find((c) => c.id === chatId);
        if (!currentChat) return;
        document.getElementById("empty-chat").style.display = "none";
        document.getElementById("chat-view").classList.add("active");
        document.getElementById("chat-title").textContent =
          getChatName(currentChat);
        loadMessages(chatId);
        renderChats();
        if (window.innerWidth < 768) toggleSidebar();
      }

      async function loadMessages(chatId) {
        try {
          const res = await fetch(`/api/chats/${chatId}/messages`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          if (data.success) {
            const container = document.getElementById("messages");
            container.innerHTML = data.messages
              .map(
                (msg) => `
            <div class="message ${msg.sender_id === currentUser.id ? "sent" : "received"}">
              ${msg.sender_id !== currentUser.id ? `<div class="msg-sender">${msg.username}</div>` : ""}
              <div>${msg.content}</div>
              <div class="msg-time">${new Date(msg.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
            </div>
          `,
              )
              .join("");
            container.scrollTop = container.scrollHeight;
          }
        } catch (error) {}
      }

      function sendMessage() {
        const input = document.getElementById("message-input");
        const message = input.value.trim();
        if (!message || !currentChat) return;

        if (currentChat.type === "private") {
          const toUser = currentChat.members.find(
            (m) => m.id !== currentUser.id,
          );
          socket.emit("private-message", {
            chatId: currentChat.id,
            fromUser: currentUser,
            toUserId: toUser.id,
            message,
          });
        } else {
          socket.emit("group-message", {
            groupId: currentChat.id,
            fromUser: currentUser,
            message,
          });
        }
        input.value = "";
        setTimeout(() => loadMessages(currentChat.id), 100);
      }

      function closeChat() {
        currentChat = null;
        document.getElementById("empty-chat").style.display = "flex";
        document.getElementById("chat-view").classList.remove("active");
        renderChats();
      }

      async function createGroup() {
        const name = prompt("Название группы:");
        if (!name) return;
        try {
          const res = await fetch("/api/chats", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ type: "group", groupName: name }),
          });
          const data = await res.json();
          if (data.success) {
            await loadChats();
            openChatById(data.chat.id);
          }
        } catch (error) {}
      }

      async function searchUsers() {
        const q = document.getElementById("search-input").value.trim();
        if (!q) return loadChats();
        try {
          const res = await fetch(
            `/api/auth/search?q=${q}&userId=${currentUser.id}`,
            { headers: { Authorization: `Bearer ${token}` } },
          );
          const data = await res.json();
          if (data.success) {
            const container = document.getElementById("chats-list");
            container.innerHTML = data.users
              .map(
                (user) => `
            <div class="chat-item" onclick="startPrivateChat('${user.username}')">
              <div class="chat-avatar">${(user.display_name || user.username).charAt(0).toUpperCase()}</div>
              <div class="chat-info">
                <div class="chat-name">${user.display_name || user.username}</div>
                <div class="chat-last">@${user.username}</div>
              </div>
            </div>
          `,
              )
              .join("");
          }
        } catch (error) {}
      }

      async function startPrivateChat(username) {
        try {
          const res = await fetch("/api/chats", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ type: "private", username }),
          });
          const data = await res.json();
          if (data.success) {
            await loadChats();
            openChatById(data.chat.id);
          }
        } catch (error) {}
      }

      function logout() {
        localStorage.clear();
        window.location.href = "/";
      }

      socket.on("private-message", (data) => {
        if (currentChat?.id === data.chatId) {
          loadMessages(currentChat.id);
        } else {
          showNotification(
            data.from.username || data.from.display_name,
            data.message,
            "private",
            data.chatId,
          );
        }
        loadChats();
      });

      socket.on("group-message", (data) => {
        if (currentChat?.id === data.groupId) {
          loadMessages(currentChat.id);
        } else {
          showNotification(
            data.from.username,
            data.message,
            "group",
            data.groupId,
          );
        }
        loadChats();
      });

      socket.on("online-users", (users) => {
        onlineUserIds = new Set(users.map((u) => u.id));
        renderChats();
      });

      loadChats();
      subscribeToPush();
    </script>
  </body>
</html>
