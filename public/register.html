<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мессенджер - Регистрация</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #131313;
        --surface2: #1a1a1a;
        --primary: #8b5cf6;
        --primary-glow: rgba(139, 92, 246, 0.3);
        --secondary: #a78bfa;
        --text: #ffffff;
        --text2: #a0a0a0;
        --border: rgba(139, 92, 246, 0.15);
        --input-bg: #1e1e1e;
        --shadow: 0 0 30px rgba(139, 92, 246, 0.1);
        --gradient: linear-gradient(
          135deg,
          #8b5cf6 0%,
          #6366f1 50%,
          #a78bfa 100%
        );
      }
      .light-theme {
        --bg: #f0f4ff;
        --surface: #ffffff;
        --surface2: #f8faff;
        --primary: #3b82f6;
        --primary-glow: rgba(59, 130, 246, 0.2);
        --secondary: #60a5fa;
        --text: #1e293b;
        --text2: #64748b;
        --border: rgba(59, 130, 246, 0.2);
        --input-bg: #f1f5f9;
        --shadow: 0 0 30px rgba(59, 130, 246, 0.1);
        --gradient: linear-gradient(
          135deg,
          #3b82f6 0%,
          #6366f1 50%,
          #60a5fa 100%
        );
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.5s ease;
        overflow: hidden;
      }
      .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 0;
        overflow: hidden;
      }
      .bg-animation .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.3;
        animation: float 20s infinite ease-in-out;
      }
      .bg-animation .orb:nth-child(1) {
        width: 400px;
        height: 400px;
        background: var(--primary);
        top: -100px;
        right: -100px;
      }
      .bg-animation .orb:nth-child(2) {
        width: 300px;
        height: 300px;
        background: var(--secondary);
        bottom: -50px;
        left: -50px;
        animation-delay: -7s;
      }
      .bg-animation .orb:nth-child(3) {
        width: 250px;
        height: 250px;
        background: var(--primary);
        top: 40%;
        left: 60%;
        animation-delay: -14s;
      }
      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(-80px, -60px) scale(1.1);
        }
        50% {
          transform: translate(60px, 80px) scale(0.9);
        }
        75% {
          transform: translate(-50px, 40px) scale(1.05);
        }
      }
      .container {
        position: relative;
        z-index: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 48px;
        width: 420px;
        max-width: 90vw;
        box-shadow: var(--shadow);
        animation: fadeInUp 0.8s ease;
        backdrop-filter: blur(20px);
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .logo {
        text-align: center;
        margin-bottom: 32px;
        font-size: 36px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      h1 {
        text-align: center;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        text-align: center;
        color: var(--text2);
        margin-bottom: 32px;
        font-size: 14px;
      }
      .form-group {
        margin-bottom: 20px;
        position: relative;
      }
      .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: var(--input-bg);
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-size: 16px;
        transition: all 0.3s ease;
        outline: none;
      }
      .form-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 20px var(--primary-glow);
      }
      .form-group label {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text2);
        transition: all 0.3s ease;
        pointer-events: none;
        font-size: 16px;
      }
      .form-group input:focus + label,
      .form-group input:not(:placeholder-shown) + label {
        top: 0;
        left: 12px;
        font-size: 12px;
        padding: 0 8px;
        background: var(--surface);
        color: var(--primary);
      }
      .btn {
        width: 100%;
        padding: 14px;
        background: var(--gradient);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px var(--primary-glow);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        transform: rotate(45deg);
        animation: shine 3s infinite;
      }
      @keyframes shine {
        0% {
          transform: translateX(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) rotate(45deg);
        }
      }
      .link {
        text-align: center;
        margin-top: 20px;
        color: var(--text2);
      }
      .link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      .link a:hover {
        color: var(--secondary);
        text-shadow: 0 0 10px var(--primary-glow);
      }
      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 50%;
        width: 48px;
        height: 48px;
        cursor: pointer;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        color: var(--text);
      }
      .theme-toggle:hover {
        box-shadow: 0 0 20px var(--primary-glow);
        transform: rotate(180deg);
      }
      .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #ef4444;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
        animation: shake 0.5s ease;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }
      @media (max-width: 480px) {
        .container {
          padding: 24px;
          border-radius: 16px;
          margin: 16px;
        }
        h1 {
          font-size: 24px;
        }
        .logo {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-animation">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <div class="container">
      <div class="logo">✨</div>
      <h1>Регистрация</h1>
      <p class="subtitle">Создайте аккаунт за пару секунд</p>
      <div class="error-message" id="error-message"></div>
      <form id="register-form">
        <div class="form-group">
          <input
            type="text"
            id="username"
            placeholder=" "
            required
            minlength="3"
          /><label for="username">Логин</label>
        </div>
        <div class="form-group">
          <input type="text" id="displayName" placeholder=" " /><label
            for="displayName"
            >Имя (необязательно)</label
          >
        </div>
        <div class="form-group">
          <input
            type="password"
            id="password"
            placeholder=" "
            required
            minlength="4"
          /><label for="password">Пароль</label>
        </div>
        <button type="submit" class="btn">Зарегистрироваться</button>
      </form>
      <p class="link">Уже есть аккаунт? <a href="/">Войти</a></p>
    </div>
    <script>
      if (localStorage.getItem("theme") === "light")
        document.body.classList.add("light-theme");
      function toggleTheme() {
        document.body.classList.toggle("light-theme");
        localStorage.setItem(
          "theme",
          document.body.classList.contains("light-theme") ? "light" : "dark",
        );
      }
      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const displayName = document.getElementById("displayName").value;
          const errorDiv = document.getElementById("error-message");
          try {
            const res = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password, displayName }),
            });
            const data = await res.json();
            if (data.success) {
              localStorage.setItem("token", data.token);
              localStorage.setItem("user", JSON.stringify(data.user));
              window.location.href = "/chat";
            } else {
              errorDiv.textContent = data.message;
              errorDiv.style.display = "block";
              setTimeout(() => (errorDiv.style.display = "none"), 3000);
            }
          } catch (err) {
            errorDiv.textContent = "Ошибка соединения";
            errorDiv.style.display = "block";
            setTimeout(() => (errorDiv.style.display = "none"), 3000);
          }
        });
    </script>
  </body>
</html>
